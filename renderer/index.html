<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self';">
  <title>Claude Controller</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>Projects</h1>
        <button id="add-project-btn" title="Add project folder">+</button>
      </div>
      <ul id="project-list"></ul>
      <div id="usage-bar">
        <div class="usage-row">
          <span class="usage-label">5h</span>
          <div class="usage-track"><div id="usage-5h-fill" class="usage-fill"></div></div>
          <span id="usage-5h-pct" class="usage-pct">0%</span>
        </div>
        <div class="usage-row">
          <span class="usage-label">7d</span>
          <div class="usage-track"><div id="usage-7d-fill" class="usage-fill"></div></div>
          <span id="usage-7d-pct" class="usage-pct">0%</span>
        </div>
        <div id="usage-reset"></div>
      </div>
    </aside>
    <main id="main">
      <div id="empty-state">
        <p>Select a project to start a Claude session</p>
        <p class="hint">or click + to add a project folder</p>
      </div>
      <div id="tab-bar">
        <div id="tab-list"></div>
        <button id="add-tab-btn" title="New terminal">+</button>
      </div>
      <div id="terminal-container"></div>
    </main>
  </div>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
